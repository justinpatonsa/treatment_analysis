<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Film Treatment Scorer — DATA 6500</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111110; color: #F0ECE3; font-family: 'DM Sans', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  textarea:focus, button:focus { outline: none; }
  ::selection { background: rgba(232,168,56,0.3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const CRITERIA = [
  { key: "producibility", label: "Producibility", description: "Can this be filmed on a class budget? Modern day, simple locations, small cast = high.", color: "#E8A838" },
  { key: "emotional_specificity", label: "Emotional Specificity", description: "Are characters' feelings grounded in concrete, relatable detail rather than genre convention?", color: "#4ECDC4" },
  { key: "narrative_restraint", label: "Narrative Restraint", description: "Is the story contained and focused, or does it try to cover too much ground?", color: "#FF6B6B" },
  { key: "character_depth", label: "Character Depth", description: "Do characters feel like real people with interior lives, or are they archetypes?", color: "#7C83FD" },
  { key: "sophistication", label: "Sophistication / Ambiguity", description: "Does the story trust its audience? Does it earn complexity rather than spell everything out?", color: "#A8E6CF" },
];

const SYSTEM_PROMPT = `You are a film treatment evaluator for a university film production class. You will score a submitted film treatment on exactly 5 criteria, each on a 1-5 scale.

CRITERIA:
1. Producibility (1-5): Can this be filmed on a student/class budget? 5 = modern day, simple real-world locations, small cast, no VFX. 1 = period piece, requires VFX/CGI, large cast, many complex locations.
2. Emotional Specificity (1-5): Are the characters' emotions grounded in concrete, relatable, human detail — or do they rely on genre tropes and conventions to generate feeling? 5 = deeply specific and human. 1 = generic or tropey.
3. Narrative Restraint (1-5): Is the story tightly focused and contained, or does it try to span too much time/geography/plot? 5 = tight, focused, could be a single evening or a few key scenes. 1 = sprawling, covers months/years, multiple locations.
4. Character Depth (1-5): Do the characters feel like real people with jobs, histories, interior lives, contradictions? Or are they archetypes serving a plot function? 5 = fully realized. 1 = thin/functional.
5. Sophistication / Ambiguity (1-5): Does the story trust the audience with ambiguity, subtext, and open questions? Or does it over-explain, moralize, or wrap up neatly? 5 = earns its complexity. 1 = spells everything out.

You MUST respond with ONLY valid JSON in this exact format, no other text:
{"title":"<detected film title>","scores":{"producibility":{"score":<1-5>,"reasoning":"<2 sentences>"},"emotional_specificity":{"score":<1-5>,"reasoning":"<2 sentences>"},"narrative_restraint":{"score":<1-5>,"reasoning":"<2 sentences>"},"character_depth":{"score":<1-5>,"reasoning":"<2 sentences>"},"sophistication":{"score":<1-5>,"reasoning":"<2 sentences>"}},"total":<sum>,"summary":"<3 sentence overall assessment>"}`;

function ScoreBar({ score, maxScore = 5, color, animate, delay = 0 }) {
  const pct = (score / maxScore) * 100;
  const [width, setWidth] = useState(0);
  useEffect(() => {
    if (animate) {
      const t = setTimeout(() => setWidth(pct), 100 + delay);
      return () => clearTimeout(t);
    } else { setWidth(pct); }
  }, [animate, pct, delay]);

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, width: "100%" }}>
      <div style={{ flex: 1, height: 28, background: "rgba(255,255,255,0.06)", borderRadius: 6, overflow: "hidden" }}>
        <div style={{
          width: width + "%", height: "100%", background: color, borderRadius: 6,
          transition: "width 0.8s cubic-bezier(0.22, 1, 0.36, 1)", boxShadow: "0 0 16px " + color + "40",
        }} />
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 700, color: color, minWidth: 28, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function ScoreCard({ result, animate, onRemove }) {
  const totalMax = 25;
  const pct = Math.round((result.total / totalMax) * 100);

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: 32, marginTop: 24, position: "relative" }}>
      <button onClick={onRemove} title="Remove" style={{
        position: "absolute", top: 16, right: 16, background: "rgba(255,255,255,0.06)",
        border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.3)",
        cursor: "pointer", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 16, fontFamily: "'JetBrains Mono', monospace",
      }}>×</button>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28, paddingRight: 36 }}>
        <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 700, color: "#F0ECE3", margin: 0, letterSpacing: "-0.02em" }}>{result.title}</h2>
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: "12px 20px", textAlign: "center", border: "1px solid rgba(255,255,255,0.1)", flexShrink: 0 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 800, color: pct >= 75 ? "#A8E6CF" : pct >= 50 ? "#E8A838" : "#FF6B6B" }}>
            {result.total}<span style={{ fontSize: 16, opacity: 0.5 }}>/{totalMax}</span>
          </div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em" }}>Total</div>
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        {CRITERIA.map((c, i) => {
          const s = result.scores[c.key];
          return (
            <div key={c.key}>
              <div style={{ marginBottom: 6 }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.08em", color: c.color, fontWeight: 600 }}>{c.label}</span>
              </div>
              <ScoreBar score={s.score} color={c.color} animate={animate} delay={i * 120} />
              <p style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", margin: "6px 0 0 0", lineHeight: 1.5, fontFamily: "'DM Sans', sans-serif" }}>{s.reasoning}</p>
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 24, padding: "16px 20px", background: "rgba(255,255,255,0.04)", borderRadius: 10, borderLeft: "3px solid rgba(255,255,255,0.15)" }}>
        <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", margin: 0, lineHeight: 1.7, fontFamily: "'DM Sans', sans-serif", fontStyle: "italic" }}>{result.summary}</p>
      </div>
    </div>
  );
}

function ComparisonView({ results }) {
  const sorted = [...results].sort((a, b) => b.total - a.total);

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: 32, marginTop: 32 }}>
      <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 700, color: "#F0ECE3", margin: "0 0 24px 0" }}>Ranking</h2>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {sorted.map((r, i) => (
          <div key={r.title} style={{
            display: "flex", alignItems: "center", gap: 16, padding: "14px 18px",
            background: i === 0 ? "rgba(168,230,207,0.08)" : "rgba(255,255,255,0.02)",
            border: i === 0 ? "1px solid rgba(168,230,207,0.2)" : "1px solid rgba(255,255,255,0.05)",
            borderRadius: 10, flexWrap: "wrap",
          }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, fontWeight: 800, color: i === 0 ? "#A8E6CF" : "rgba(255,255,255,0.25)", minWidth: 32 }}>#{i + 1}</span>
            <span style={{ flex: 1, fontFamily: "'DM Sans', sans-serif", fontSize: 16, color: i === 0 ? "#F0ECE3" : "rgba(255,255,255,0.55)", fontWeight: 500, minWidth: 140 }}>{r.title}</span>
            <div style={{ display: "flex", gap: 6 }}>
              {CRITERIA.map((c) => {
                const val = r.scores[c.key].score;
                const alpha = Math.round((val / 5) * 200 + 55).toString(16).padStart(2, "0");
                return (
                  <div key={c.key} title={c.label + ": " + val} style={{
                    width: 28, height: 28, borderRadius: 6, background: c.color + alpha,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 700, color: "#1A1A1A", fontFamily: "'JetBrains Mono', monospace",
                  }}>{val}</div>
                );
              })}
            </div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 800, color: i === 0 ? "#A8E6CF" : "rgba(255,255,255,0.4)", minWidth: 40, textAlign: "right" }}>{r.total}</span>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 16, flexWrap: "wrap" }}>
        {CRITERIA.map(c => (
          <div key={c.key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "rgba(255,255,255,0.35)", fontFamily: "'JetBrains Mono', monospace" }}>
            <div style={{ width: 10, height: 10, borderRadius: 3, background: c.color }} /> {c.label}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [inputText, setInputText] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);

  async function scoreText(text) {
    if (!text.trim() || !apiKey.trim()) {
      setError(!apiKey.trim() ? "Please enter your Anthropic API key above." : null);
      return;
    }
    setLoading(true);
    setError(null);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: "Please score the following film treatment:\n\n" + text }],
        }),
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || "API request failed (" + response.status + ")");
      }

      const data = await response.json();
      const raw = data.content.map(i => i.text || "").join("");
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      setResults(prev => {
        const existing = prev.findIndex(r => r.title === parsed.title);
        if (existing >= 0) {
          const updated = [...prev];
          updated[existing] = parsed;
          return updated;
        }
        return [...prev, parsed];
      });
      setInputText("");
    } catch (err) {
      console.error(err);
      setError("Scoring failed: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  function removeResult(title) {
    setResults(prev => prev.filter(r => r.title !== title));
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setInputText(ev.target.result);
    reader.readAsText(file);
  }

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "48px 24px" }}>
        {/* Header */}
        <div style={{ marginBottom: 48 }}>
          <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", fontFamily: "'JetBrains Mono', monospace", marginBottom: 12 }}>
            DATA 6500 — Film Treatment Evaluator
          </div>
          <h1 style={{
            fontFamily: "'Playfair Display', serif", fontSize: 42, fontWeight: 800,
            letterSpacing: "-0.03em", lineHeight: 1.1,
            background: "linear-gradient(135deg, #F0ECE3 0%, #A8A090 100%)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
          }}>Treatment Scorer</h1>
          <p style={{ fontSize: 15, color: "rgba(255,255,255,0.4)", marginTop: 12, lineHeight: 1.6, maxWidth: 520 }}>
            Paste a film treatment below. The AI evaluates it across five weighted criteria and returns a scored breakdown. Score multiple treatments to see a ranked comparison.
          </p>
        </div>

        {/* API Key */}
        <div style={{
          background: "rgba(232,168,56,0.06)", border: "1px solid rgba(232,168,56,0.15)",
          borderRadius: 12, padding: "16px 20px", marginBottom: 24,
        }}>
          <label style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: "#E8A838", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>
            Anthropic API Key
          </label>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <input
              type={showKey ? "text" : "password"}
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-..."
              style={{
                flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: 8, padding: "10px 14px", color: "#F0ECE3", fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
              }}
            />
            <button onClick={() => setShowKey(!showKey)} style={{
              background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
              borderRadius: 8, padding: "10px 14px", color: "rgba(255,255,255,0.4)",
              cursor: "pointer", fontSize: 12, fontFamily: "'JetBrains Mono', monospace",
            }}>{showKey ? "Hide" : "Show"}</button>
          </div>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", marginTop: 8, lineHeight: 1.4 }}>
            Your key stays in your browser — it's never stored or sent anywhere except directly to Anthropic's API.
          </p>
        </div>

        {/* Criteria Legend */}
        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 32,
          padding: 20, background: "rgba(255,255,255,0.02)", borderRadius: 12,
          border: "1px solid rgba(255,255,255,0.06)",
        }}>
          {CRITERIA.map(c => (
            <div key={c.key} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: c.color, marginTop: 5, flexShrink: 0 }} />
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: c.color, fontFamily: "'JetBrains Mono', monospace" }}>{c.label}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", lineHeight: 1.4 }}>{c.description}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Input */}
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 24 }}>
          <textarea
            value={inputText}
            onChange={e => setInputText(e.target.value)}
            placeholder="Paste the film treatment text here..."
            rows={8}
            style={{
              width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: 10, padding: 16, color: "#F0ECE3", fontSize: 14,
              fontFamily: "'DM Sans', sans-serif", resize: "vertical", lineHeight: 1.6,
            }}
          />
          <div style={{ display: "flex", gap: 12, marginTop: 14, alignItems: "center" }}>
            <label style={{
              padding: "10px 18px", borderRadius: 8, fontSize: 13, fontWeight: 500,
              background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.5)",
              cursor: "pointer", border: "1px solid rgba(255,255,255,0.08)",
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              Upload .txt
              <input type="file" accept=".txt" onChange={handleFile} style={{ display: "none" }} />
            </label>
            <button
              onClick={() => scoreText(inputText)}
              disabled={loading || !inputText.trim()}
              style={{
                flex: 1, padding: "12px 24px", borderRadius: 8, border: "none",
                background: loading ? "rgba(255,255,255,0.06)" : "linear-gradient(135deg, #E8A838, #FF6B6B)",
                color: loading ? "rgba(255,255,255,0.3)" : "#1A1A1A",
                fontSize: 14, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer",
                fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.03em",
              }}
            >{loading ? "Scoring..." : "Score Treatment"}</button>
          </div>
          {error && <div style={{ marginTop: 12, color: "#FF6B6B", fontSize: 13 }}>{error}</div>}
        </div>

        {/* Loading */}
        {loading && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "rgba(255,255,255,0.3)", fontSize: 14, fontStyle: "italic" }}>
            <div style={{
              width: 32, height: 32, border: "3px solid rgba(255,255,255,0.08)",
              borderTop: "3px solid #E8A838", borderRadius: "50%",
              margin: "0 auto 16px", animation: "spin 1s linear infinite",
            }} />
            Reading and evaluating treatment...
          </div>
        )}

        {/* Results */}
        {results.map(r => (
          <ScoreCard key={r.title} result={r} animate={true} onRemove={() => removeResult(r.title)} />
        ))}

        {/* Comparison */}
        {results.length >= 2 && <ComparisonView results={results} />}

        {/* Footer */}
        <div style={{ marginTop: 48, paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.06)", textAlign: "center" }}>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", fontFamily: "'JetBrains Mono', monospace" }}>
            Built for DATA 6500 — Film Treatment Selection Protocol
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
